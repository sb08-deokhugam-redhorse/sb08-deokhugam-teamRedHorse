spring:
  flyway:
    enabled: true
    locations: classpath:db/migration/h2

  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    hibernate:
      ddl-auto: create-drop

  sql:
    init:
      mode: never

  batch:
    jdbc:
      # 앱 시작 시 스프링 배치가 메타데이터 테이블을 자동으로 생성하도록 설정
      initialize-schema: always
    job:
      enabled: false # 다수 Job 빈 존재로 인한 기동 오류 방지 - 스케줄러(`@Scheduled`)로 별도 실행

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace
    org.springframework.test: debug

# 인증 인터셉터
auth:
  interceptor:
    enabled: false

# NAVER
naver:
  api:
    client-id: test
    client-secret: test
    url: http://localhost

# ocr
ocr:
  space:
    api-key: test
    url: https://test-api.ocr.space/parse/image

# s3
storage:
  s3:
    access-key: test-access-key
    secret-key: test-secret-key
    region: ap-northeast-2
    bucket: test-bucket
    expiration-duration-in-minutes: 10