spring:
  jpa:
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
        default_batch_fetch_size: 100
        jdbc:
          time_zone: UTC
    show-sql: true
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

  flyway:
    enabled: true
    locations:
      - classpath:db/migration # 스키마 저장 위치 - 관례

  batch:
    jdbc:
      # 앱 시작 시 스프링 배치가 메타데이터 테이블을 자동으로 생성하도록 설정
      initialize-schema: always
    job:
        enabled: false

# Common Logging
logging:
  level:
    root: info

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

# Naver API
naver:
  api:
    client-id: ${NAVER_CLIENT_ID}
    client-secret: ${NAVER_CLIENT_SECRET}
    url: https://openapi.naver.com/v1/search/book_adv.json?d_isbn=

